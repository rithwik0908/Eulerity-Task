<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Manager</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --ink: #20242a;
            --muted: #667085;
            --line: #d9dee7;
            --accent: #176b87;
            --accent-dark: #0f4f63;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--line);
            padding: 20px 28px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0;
        }

        main {
            display: grid;
            grid-template-columns: minmax(320px, 420px) 1fr;
            gap: 24px;
            max-width: 1180px;
            margin: 0 auto;
            padding: 24px;
        }

        section {
            min-width: 0;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 18px;
        }

        .stack {
            display: grid;
            gap: 16px;
        }

        h2 {
            margin: 0 0 14px;
            font-size: 18px;
            letter-spacing: 0;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 13px;
        }

        input,
        textarea,
        select {
            width: 100%;
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 9px 10px;
            color: var(--ink);
            font: inherit;
            background: #fff;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        button {
            min-height: 40px;
            border: 0;
            border-radius: 6px;
            padding: 0 14px;
            background: var(--accent);
            color: white;
            font: inherit;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        button.secondary {
            border: 1px solid var(--line);
            background: white;
            color: var(--ink);
        }

        button.secondary:hover {
            border-color: var(--accent);
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .task-list {
            display: grid;
            gap: 12px;
        }

        .task {
            display: grid;
            gap: 10px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 14px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: start;
        }

        .task-title {
            margin: 0;
            font-size: 17px;
            line-height: 1.3;
            overflow-wrap: anywhere;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
        }

        .pill {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 8px;
            background: #fafbfc;
        }

        .suggestion {
            display: none;
            white-space: pre-wrap;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: #fafbfc;
            font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 13px;
            overflow-x: auto;
        }

        .message {
            min-height: 20px;
            color: var(--danger);
            font-size: 13px;
        }

        @media (max-width: 820px) {
            main {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Task Manager</h1>
</header>
<main>
    <section class="stack">
        <div class="panel">
            <h2>Create Task</h2>
            <form id="task-form" class="form-grid">
                <label>
                    Title
                    <input id="title" required>
                </label>
                <label>
                    Description
                    <textarea id="description"></textarea>
                </label>
                <div class="row">
                    <label>
                        Due date
                        <input id="dueDate" type="date">
                    </label>
                    <label>
                        Priority
                        <select id="priority">
                            <option>LOW</option>
                            <option selected>MEDIUM</option>
                            <option>HIGH</option>
                        </select>
                    </label>
                </div>
                <label>
                    Status
                    <select id="status">
                        <option selected>TODO</option>
                        <option>IN_PROGRESS</option>
                        <option>DONE</option>
                    </select>
                </label>
                <button type="submit">Create</button>
            </form>
        </div>

        <div class="panel">
            <h2>AI Suggestion</h2>
            <form id="suggest-form" class="form-grid">
                <label>
                    Plain-language reminder
                    <textarea id="suggestText">remind me to submit the quarterly report before Friday</textarea>
                </label>
                <button type="submit">Suggest Task</button>
            </form>
            <pre id="suggestion" class="suggestion"></pre>
        </div>
    </section>

    <section>
        <div class="task-header">
            <h2>Tasks</h2>
            <button id="refresh" type="button" class="secondary">Refresh</button>
        </div>
        <div id="message" class="message"></div>
        <div id="tasks" class="task-list"></div>
    </section>
</main>

<script>
    const taskForm = document.querySelector('#task-form');
    const suggestForm = document.querySelector('#suggest-form');
    const tasksEl = document.querySelector('#tasks');
    const messageEl = document.querySelector('#message');
    const suggestionEl = document.querySelector('#suggestion');

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: {'Content-Type': 'application/json'},
            ...options
        });
        if (!response.ok) {
            throw new Error(`Request failed with ${response.status}`);
        }
        if (response.status === 204) {
            return null;
        }
        return response.json();
    }

    async function loadTasks() {
        messageEl.textContent = '';
        const tasks = await requestJson('/tasks');
        tasksEl.innerHTML = tasks.map(task => `
            <article class="task">
                <div class="task-header">
                    <h3 class="task-title">${escapeHtml(task.title)}</h3>
                    <button class="secondary" type="button" data-delete="${task.id}">Delete</button>
                </div>
                <div>${escapeHtml(task.description || '')}</div>
                <div class="meta">
                    <span class="pill">${task.dueDate || 'No due date'}</span>
                    <span class="pill">${task.priority}</span>
                    <span class="pill">${task.status}</span>
                </div>
            </article>
        `).join('');
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    taskForm.addEventListener('submit', async event => {
        event.preventDefault();
        const payload = {
            title: document.querySelector('#title').value,
            description: document.querySelector('#description').value || null,
            dueDate: document.querySelector('#dueDate').value || null,
            priority: document.querySelector('#priority').value,
            status: document.querySelector('#status').value
        };
        try {
            await requestJson('/tasks', {method: 'POST', body: JSON.stringify(payload)});
            taskForm.reset();
            document.querySelector('#priority').value = 'MEDIUM';
            document.querySelector('#status').value = 'TODO';
            await loadTasks();
        } catch (error) {
            messageEl.textContent = error.message;
        }
    });

    suggestForm.addEventListener('submit', async event => {
        event.preventDefault();
        suggestionEl.style.display = 'none';
        try {
            const suggestion = await requestJson('/tasks/suggest', {
                method: 'POST',
                body: JSON.stringify({text: document.querySelector('#suggestText').value})
            });
            suggestionEl.textContent = JSON.stringify(suggestion, null, 2);
            suggestionEl.style.display = 'block';
        } catch (error) {
            messageEl.textContent = error.message;
        }
    });

    tasksEl.addEventListener('click', async event => {
        const id = event.target.dataset.delete;
        if (!id) {
            return;
        }
        try {
            await requestJson(`/tasks/${id}`, {method: 'DELETE'});
            await loadTasks();
        } catch (error) {
            messageEl.textContent = error.message;
        }
    });

    document.querySelector('#refresh').addEventListener('click', loadTasks);
    loadTasks().catch(error => messageEl.textContent = error.message);
</script>
</body>
</html>
